<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>스케줄표</title>
<meta name="theme-color" content="#4f46e5" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="스케줄표" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="calendar-header">
    <button id="prevMonth" class="nav-btn" aria-label="이전 달">‹</button>
    <h1 id="monthLabel" class="month-label">2026년 7월</h1>
    <button id="nextMonth" class="nav-btn" aria-label="다음 달">›</button>
  </header>

  <div class="share-row">
    <div class="bottom-bar-spacer" aria-hidden="true"></div>
    <button type="button" id="todayBtn" class="today-btn" aria-label="오늘로 이동">
      <span class="btn-text">오늘</span>
      <svg class="btn-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 11.5 12 4l8 7.5" />
        <path d="M6 10v9h5v-5h2v5h5v-9" />
      </svg>
      <span class="btn-icon-label" aria-hidden="true">Today</span>
    </button>
    <button type="button" id="alarmBtn" class="today-btn alarm-btn" aria-label="오늘 일정 알림">
      <span class="btn-text">알림</span>
      <svg class="btn-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span class="btn-icon-label" aria-hidden="true">알림</span>
    </button>
    <button type="button" id="shareBtn" class="share-btn" aria-label="더보기">
      <span id="shareBtnLabel" class="btn-text">공유 안 함</span>
      <svg class="btn-icon" viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" aria-hidden="true">
        <circle cx="5" cy="12" r="1.6" />
        <circle cx="12" cy="12" r="1.6" />
        <circle cx="19" cy="12" r="1.6" />
      </svg>
    </button>
  </div>

  <div class="share-panel" id="todayAlarmPanel" hidden>
    <p class="all-schedule-title">오늘 일정</p>
    <ul id="todayAlarmList" class="all-schedule-list"></ul>
    <p id="todayAlarmEmpty" class="all-schedule-empty" hidden>오늘 등록된 일정이 없습니다.</p>
  </div>

  <div class="share-panel" id="sharePanel" hidden>
    <p class="all-schedule-title">전체 일정</p>
    <ul id="allScheduleList" class="all-schedule-list"></ul>
    <p id="allScheduleEmpty" class="all-schedule-empty" hidden>등록된 일정이 없습니다.</p>

    <p id="shareStatusText" class="share-status"></p>

    <div id="shareSoloView">
      <button type="button" id="createSpaceBtn" class="share-action-btn">새 공유 코드 만들기</button>
      <div class="join-row">
        <input type="text" id="joinCodeInput" placeholder="공유 코드 입력" maxlength="8" />
        <button type="button" id="joinSpaceBtn" class="share-action-btn">참여</button>
      </div>
    </div>

    <div id="shareActiveView" hidden>
      <div class="share-code-row">
        <span id="shareCodeText" class="share-code"></span>
        <button type="button" id="copyCodeBtn" class="share-action-btn">코드 복사</button>
      </div>
      <button type="button" id="leaveSpaceBtn" class="share-action-btn leave">공유 그만두기</button>
    </div>
  </div>

  <div class="weekday-row">
    <span class="wd sun">일</span>
    <span class="wd">월</span>
    <span class="wd">화</span>
    <span class="wd">수</span>
    <span class="wd">목</span>
    <span class="wd">금</span>
    <span class="wd sat">토</span>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="overlay" id="overlay"></div>

<section class="modal" id="panel" role="dialog" aria-modal="true" aria-labelledby="panelDate">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <h2 id="panelDate">날짜</h2>
    <button id="closePanel" class="modal-close" aria-label="닫기">✕</button>
  </div>

  <div class="add-row">
    <div class="quick-input">
      <input type="text" id="todoInput" placeholder="" maxlength="200" />
      <button type="button" id="cancelEditBtn" class="cancel-edit-btn" aria-label="편집 취소" hidden>✕</button>
      <button type="button" id="addBtn" class="send-btn" aria-label="추가">+</button>
    </div>
    <div class="meta-row">
      <div class="repeat-select" id="repeatSelectWrap">
        <button type="button" id="repeatDropdownBtn" class="repeat-dropdown-btn" aria-haspopup="true" aria-expanded="false">
          <span id="repeatDropdownLabel">오늘</span>
          <span class="caret">⌄</span>
        </button>
        <div class="repeat-menu" id="repeatMenu" hidden>
          <button type="button" class="repeat-menu-item active" data-value="none">오늘</button>
          <button type="button" class="repeat-menu-item" data-value="weekday">평일</button>
          <button type="button" class="repeat-menu-item" data-value="weekly">매주</button>
        </div>
      </div>
      <div class="time-select" id="timeSelectWrap">
        <select id="periodSelect" aria-label="오전/오후">
          <option value="AM">오전</option>
          <option value="PM">오후</option>
        </select>
        <select id="hourSelect" aria-label="시">
          <option value="">--</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
        </select>
        <span class="colon">:</span>
        <select id="minuteSelect" aria-label="분">
          <option value="">--</option>
          <option value="00">00</option>
          <option value="05">05</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="25">25</option>
          <option value="30">30</option>
          <option value="35">35</option>
          <option value="40">40</option>
          <option value="45">45</option>
          <option value="50">50</option>
          <option value="55">55</option>
        </select>
      </div>
    </div>
    <div class="range-row" id="rangeRow">
      <label class="range-toggle" for="rangeToggle">
        <input type="checkbox" id="rangeToggle" />
        <span>여러 날 연속</span>
      </label>
      <input type="date" id="endDateInput" class="end-date-input" aria-label="종료 날짜" hidden />
    </div>
    <div class="color-row" id="colorRow">
      <button type="button" class="color-swatch active" data-color="" aria-label="기본"><span class="swatch-dot"></span></button>
      <button type="button" class="color-swatch" data-color="red" aria-label="빨강"><span class="swatch-dot"></span></button>
      <button type="button" class="color-swatch" data-color="green" aria-label="초록"><span class="swatch-dot"></span></button>
    </div>
  </div>

  <ul id="todoList" class="todo-list"></ul>
  <p id="emptyMsg" class="empty-msg" hidden>오늘 등록된 일정이 없습니다.</p>
</section>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
